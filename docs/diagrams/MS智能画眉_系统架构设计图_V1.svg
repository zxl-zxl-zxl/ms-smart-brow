<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #26324a; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #6f7890; }
      .section-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #31405f; }
      .box-title { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #26324a; }
      .text { font: 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4f5b73; }
      .small { font: 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #63708a; }
      .tiny { font: 11px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #69758d; }
      .outer { fill: #ffffff; stroke: #8ca0d2; stroke-width: 2; rx: 8; }
      .panel { fill: #fbfcff; stroke: #c5d1ec; stroke-width: 1.5; rx: 8; }
      .green { fill: #f2fbf4; stroke: #b9ddc1; }
      .blue { fill: #f2f7ff; stroke: #b9cbed; }
      .purple { fill: #f8f4ff; stroke: #d2c2ee; }
      .orange { fill: #fff8ef; stroke: #eccb9c; }
      .red { fill: #fff5f3; stroke: #efb8b0; }
      .cyan { fill: #f2fbfc; stroke: #acdbe0; }
      .module { stroke-width: 1.4; rx: 7; }
      .line { stroke: #69758d; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #69758d; stroke-width: 1.6; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .thin { stroke: #a5afc2; stroke-width: 1.2; fill: none; }
      .phone { fill: #20232c; stroke: #11131a; stroke-width: 2; rx: 28; }
      .screen { fill: #fffaf4; rx: 20; }
      .accent { fill: #8a5a3b; }
      .muted { fill: #e8ddd2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#69758d"/>
    </marker>
  </defs>

  <rect x="28" y="28" width="1744" height="1124" class="outer"/>
  <text x="900" y="72" text-anchor="middle" class="title">MS 智能画眉微信小程序 · 系统架构设计图（V1）</text>
  <text x="900" y="104" text-anchor="middle" class="subtitle">Taro + React + TypeScript · 微信云开发 · 云数据库 · 端侧定标识别 · Canvas 辅助线</text>

  <!-- 1 Client -->
  <rect x="55" y="135" width="590" height="520" class="panel green"/>
  <text x="75" y="166" class="section-title">1. 展示层 / 客户端</text>
  <text x="245" y="166" class="box-title" fill="#2f7f48">Taro 微信小程序（React + TypeScript）</text>

  <rect x="90" y="188" width="190" height="360" class="phone"/>
  <rect x="105" y="212" width="160" height="310" class="screen"/>
  <text x="185" y="248" text-anchor="middle" class="box-title">MS 智能画眉</text>
  <circle cx="185" cy="318" r="62" fill="#f8eadf" stroke="#d5b9a3"/>
  <path d="M148 302 C162 291, 177 292, 190 303" stroke="#8a5a3b" stroke-width="3" fill="none" stroke-dasharray="6 5"/>
  <path d="M180 303 C195 291, 213 291, 226 302" stroke="#8a5a3b" stroke-width="3" fill="none" stroke-dasharray="6 5"/>
  <line x1="185" y1="260" x2="185" y2="390" stroke="#c9a58d" stroke-width="1.4" stroke-dasharray="5 5"/>
  <line x1="128" y1="318" x2="242" y2="318" stroke="#c9a58d" stroke-width="1.4" stroke-dasharray="5 5"/>
  <rect x="124" y="424" width="122" height="32" rx="16" fill="#8a5a3b"/>
  <text x="185" y="445" text-anchor="middle" fill="#fff" font-size="13" font-family="PingFang SC, Microsoft YaHei, Arial">开始定标</text>
  <rect x="124" y="470" width="36" height="22" rx="8" fill="#f0dfd2"/>
  <rect x="168" y="470" width="36" height="22" rx="8" fill="#f0dfd2"/>
  <rect x="212" y="470" width="36" height="22" rx="8" fill="#f0dfd2"/>

  <rect x="315" y="195" width="292" height="76" class="module green"/>
  <text x="334" y="224" class="box-title">主包页面</text>
  <text x="334" y="250" class="text">首页 / 相机页 / 保存成功 / 个人中心</text>

  <rect x="315" y="292" width="292" height="82" class="module green"/>
  <text x="334" y="321" class="box-title">业务组件</text>
  <text x="334" y="347" class="text">眉形卡片 / 微调面板 / 权限引导</text>
  <text x="334" y="366" class="text">确认弹窗 / 按钮 / 首页主视觉</text>

  <rect x="315" y="395" width="292" height="112" class="module green"/>
  <text x="334" y="424" class="box-title">核心业务模块</text>
  <text x="334" y="450" class="text">auth / camera / permissions / cloud</text>
  <text x="334" y="470" class="text">faceAnalyzer / browEngine</text>
  <text x="334" y="490" class="text">overlayRenderer / recommendation</text>

  <rect x="315" y="530" width="292" height="74" class="module green"/>
  <text x="334" y="559" class="box-title">本地配置</text>
  <text x="334" y="585" class="text">眉形模板配置 / 主题变量 / 类型定义</text>

  <!-- 2 Cloud backend -->
  <rect x="690" y="135" width="515" height="520" class="panel blue"/>
  <text x="710" y="166" class="section-title">2. 后端服务层</text>
  <text x="880" y="166" class="box-title">微信云开发（CloudBase）</text>

  <rect x="725" y="198" width="130" height="92" class="module blue"/>
  <text x="790" y="228" text-anchor="middle" class="box-title">initUser</text>
  <text x="790" y="255" text-anchor="middle" class="text">登录初始化</text>
  <text x="790" y="274" text-anchor="middle" class="small">openid / userId</text>

  <rect x="875" y="198" width="130" height="92" class="module blue"/>
  <text x="940" y="228" text-anchor="middle" class="box-title">getUserProfile</text>
  <text x="940" y="255" text-anchor="middle" class="text">用户资料</text>
  <text x="940" y="274" text-anchor="middle" class="small">头像 / 昵称</text>

  <rect x="1025" y="198" width="140" height="92" class="module blue"/>
  <text x="1095" y="228" text-anchor="middle" class="box-title">updatePreference</text>
  <text x="1095" y="255" text-anchor="middle" class="text">偏好更新</text>
  <text x="1095" y="274" text-anchor="middle" class="small">模板 / 透明度</text>

  <rect x="725" y="325" width="130" height="92" class="module blue"/>
  <text x="790" y="355" text-anchor="middle" class="box-title">auth</text>
  <text x="790" y="382" text-anchor="middle" class="text">微信登录</text>
  <text x="790" y="401" text-anchor="middle" class="small">云函数封装</text>

  <rect x="875" y="325" width="130" height="92" class="module blue"/>
  <text x="940" y="355" text-anchor="middle" class="box-title">user</text>
  <text x="940" y="382" text-anchor="middle" class="text">用户中心</text>
  <text x="940" y="401" text-anchor="middle" class="small">资料读写</text>

  <rect x="1025" y="325" width="140" height="92" class="module blue"/>
  <text x="1095" y="355" text-anchor="middle" class="box-title">common</text>
  <text x="1095" y="382" text-anchor="middle" class="text">错误/日志</text>
  <text x="1095" y="401" text-anchor="middle" class="small">统一返回结构</text>

  <rect x="725" y="465" width="200" height="92" class="module blue"/>
  <text x="825" y="496" text-anchor="middle" class="box-title">微信云数据库</text>
  <text x="825" y="523" text-anchor="middle" class="text">users / user_preferences</text>
  <text x="825" y="542" text-anchor="middle" class="small">V2 预留 orders / entitlements</text>

  <rect x="955" y="465" width="210" height="92" class="module blue"/>
  <text x="1060" y="496" text-anchor="middle" class="box-title">微信生态能力</text>
  <text x="1060" y="523" text-anchor="middle" class="text">客服 / 权限 / 后续支付</text>
  <text x="1060" y="542" text-anchor="middle" class="small">V1 不接支付</text>

  <!-- 3 Core algorithms -->
  <rect x="1250" y="135" width="495" height="520" class="panel purple"/>
  <text x="1270" y="166" class="section-title">3. 端侧智能与画眉引擎</text>
  <text x="1480" y="166" class="box-title">定标识别 + 规则推荐 + 辅助线生成</text>

  <rect x="1285" y="198" width="132" height="96" class="module purple"/>
  <text x="1351" y="228" text-anchor="middle" class="box-title">faceAnalyzer</text>
  <text x="1351" y="255" text-anchor="middle" class="text">定标识别</text>
  <text x="1351" y="275" text-anchor="middle" class="small">单次识别</text>

  <rect x="1435" y="198" width="132" height="96" class="module purple"/>
  <text x="1501" y="228" text-anchor="middle" class="box-title">recommendation</text>
  <text x="1501" y="255" text-anchor="middle" class="text">眉形推荐</text>
  <text x="1501" y="275" text-anchor="middle" class="small">本地规则</text>

  <rect x="1585" y="198" width="132" height="96" class="module purple"/>
  <text x="1651" y="228" text-anchor="middle" class="box-title">browEngine</text>
  <text x="1651" y="255" text-anchor="middle" class="text">路径生成</text>
  <text x="1651" y="275" text-anchor="middle" class="small">眉形/五官线</text>

  <rect x="1285" y="330" width="132" height="96" class="module purple"/>
  <text x="1351" y="360" text-anchor="middle" class="box-title">overlayRenderer</text>
  <text x="1351" y="387" text-anchor="middle" class="text">Canvas 绘制</text>
  <text x="1351" y="407" text-anchor="middle" class="small">虚线/圆点</text>

  <rect x="1435" y="330" width="132" height="96" class="module purple"/>
  <text x="1501" y="360" text-anchor="middle" class="box-title">browTemplates</text>
  <text x="1501" y="387" text-anchor="middle" class="text">本地模板</text>
  <text x="1501" y="407" text-anchor="middle" class="small">自然/标准/平/弯月</text>

  <rect x="1585" y="330" width="132" height="96" class="module purple"/>
  <text x="1651" y="360" text-anchor="middle" class="box-title">qualityCheck</text>
  <text x="1651" y="387" text-anchor="middle" class="text">质量判断</text>
  <text x="1651" y="407" text-anchor="middle" class="small">光线/距离/多人脸</text>

  <rect x="1285" y="468" width="432" height="86" class="module purple"/>
  <text x="1501" y="500" text-anchor="middle" class="box-title">V1 数据边界</text>
  <text x="1501" y="527" text-anchor="middle" class="text">不上传照片 · 不保存人脸关键点 · 不接云端大模型</text>

  <!-- 4 Infrastructure -->
  <rect x="55" y="705" width="920" height="230" class="panel cyan"/>
  <text x="75" y="736" class="section-title">4. 基础能力 / 本地与云端资源</text>

  <rect x="90" y="770" width="190" height="95" class="module cyan"/>
  <text x="185" y="800" text-anchor="middle" class="box-title">微信相机能力</text>
  <text x="185" y="827" text-anchor="middle" class="text">前置 camera</text>
  <text x="185" y="846" text-anchor="middle" class="small">拍照保存净图</text>

  <rect x="310" y="770" width="190" height="95" class="module cyan"/>
  <text x="405" y="800" text-anchor="middle" class="box-title">权限系统</text>
  <text x="405" y="827" text-anchor="middle" class="text">相机 / 相册 / 用户资料</text>
  <text x="405" y="846" text-anchor="middle" class="small">引导页与弹窗</text>

  <rect x="530" y="770" width="190" height="95" class="module cyan"/>
  <text x="625" y="800" text-anchor="middle" class="box-title">本地缓存</text>
  <text x="625" y="827" text-anchor="middle" class="text">登录态 / 用户信息</text>
  <text x="625" y="846" text-anchor="middle" class="small">不缓存照片</text>

  <rect x="750" y="770" width="190" height="95" class="module cyan"/>
  <text x="845" y="800" text-anchor="middle" class="box-title">主题与资源</text>
  <text x="845" y="827" text-anchor="middle" class="text">茶棕 / 米白 / 香槟</text>
  <text x="845" y="846" text-anchor="middle" class="small">抽象线稿素材</text>

  <!-- 5 External services -->
  <rect x="1015" y="705" width="730" height="230" class="panel orange"/>
  <text x="1035" y="736" class="section-title">5. 外部服务 / 微信生态</text>

  <rect x="1050" y="770" width="155" height="95" class="module orange"/>
  <text x="1127" y="800" text-anchor="middle" class="box-title">微信登录</text>
  <text x="1127" y="827" text-anchor="middle" class="text">openid</text>
  <text x="1127" y="846" text-anchor="middle" class="small">用户身份</text>

  <rect x="1235" y="770" width="155" height="95" class="module orange"/>
  <text x="1312" y="800" text-anchor="middle" class="box-title">微信客服</text>
  <text x="1312" y="827" text-anchor="middle" class="text">意见反馈</text>
  <text x="1312" y="846" text-anchor="middle" class="small">V1 接入</text>

  <rect x="1420" y="770" width="155" height="95" class="module orange"/>
  <text x="1497" y="800" text-anchor="middle" class="box-title">微信支付</text>
  <text x="1497" y="827" text-anchor="middle" class="text">会员/模板</text>
  <text x="1497" y="846" text-anchor="middle" class="small">V2 预留</text>

  <rect x="1605" y="770" width="105" height="95" class="module orange"/>
  <text x="1657" y="800" text-anchor="middle" class="box-title">App 多端</text>
  <text x="1657" y="827" text-anchor="middle" class="text">Taro 预留</text>
  <text x="1657" y="846" text-anchor="middle" class="small">V3</text>

  <!-- 6 Business links -->
  <rect x="55" y="965" width="1110" height="150" class="panel"/>
  <text x="75" y="996" class="section-title">6. 核心业务链路</text>
  <text x="95" y="1032" class="box-title" fill="#2f7f48">画眉链路：</text>
  <rect x="190" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="250" y="1034" text-anchor="middle" class="small">首页登录</text>
  <rect x="335" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="395" y="1034" text-anchor="middle" class="small">相机授权</text>
  <rect x="480" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="540" y="1034" text-anchor="middle" class="small">手动定标</text>
  <rect x="625" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="685" y="1034" text-anchor="middle" class="small">生成辅助线</text>
  <rect x="770" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="830" y="1034" text-anchor="middle" class="small">切换/微调</text>
  <rect x="915" y="1010" width="120" height="38" rx="7" fill="#f2fbf4" stroke="#b9ddc1"/>
  <text x="975" y="1034" text-anchor="middle" class="small">保存净图</text>

  <text x="95" y="1082" class="box-title" fill="#8a5a3b">收费演进：</text>
  <rect x="190" y="1060" width="120" height="38" rx="7" fill="#fff8ef" stroke="#eccb9c"/>
  <text x="250" y="1084" text-anchor="middle" class="small">积累用户</text>
  <rect x="335" y="1060" width="120" height="38" rx="7" fill="#fff8ef" stroke="#eccb9c"/>
  <text x="395" y="1084" text-anchor="middle" class="small">验证留存</text>
  <rect x="480" y="1060" width="120" height="38" rx="7" fill="#fff8ef" stroke="#eccb9c"/>
  <text x="540" y="1084" text-anchor="middle" class="small">高级模板</text>
  <rect x="625" y="1060" width="120" height="38" rx="7" fill="#fff8ef" stroke="#eccb9c"/>
  <text x="685" y="1084" text-anchor="middle" class="small">接入支付</text>
  <rect x="770" y="1060" width="120" height="38" rx="7" fill="#fff8ef" stroke="#eccb9c"/>
  <text x="830" y="1084" text-anchor="middle" class="small">权益校验</text>

