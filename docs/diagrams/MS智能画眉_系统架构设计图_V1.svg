  <!-- 7 Principles + legend -->
  <rect x="1205" y="965" width="540" height="150" class="panel"/>
  <text x="1225" y="996" class="section-title">7. 设计原则与图例</text>
  <circle cx="1240" cy="1030" r="6" fill="#51a56a"/>
  <text x="1258" y="1035" class="text">端侧优先：定标一次，不持续追踪</text>
  <circle cx="1240" cy="1060" r="6" fill="#51a56a"/>
  <text x="1258" y="1065" class="text">隐私优先：不上传照片，不保存人脸数据</text>
  <circle cx="1240" cy="1090" r="6" fill="#51a56a"/>
  <text x="1258" y="1095" class="text">扩展优先：userId 支撑未来多端和收费</text>
  <line x1="1510" y1="1028" x2="1570" y2="1028" class="line"/>
  <text x="1585" y="1033" class="small">同步调用</text>
  <line x1="1510" y1="1060" x2="1570" y2="1060" class="dash"/>
  <text x="1585" y="1065" class="small">后续扩展</text>
  <rect x="1510" y="1080" width="48" height="24" class="module green"/>
  <text x="1585" y="1097" class="small">客户端</text>

